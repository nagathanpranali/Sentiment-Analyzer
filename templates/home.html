<!DOCTYPE html>
<html>
<head>
    <title>Review Classifier App</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #f0f7ff;
            padding: 45px;
            border-radius: 20px;
            width: 520px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            animation: fadeIn 0.8s ease-in-out;
        }

        h1 {
            margin-bottom: 10px;
            color: #2b5876;
            font-size: 34px;
        }

        .subtitle {
            font-size: 17px;
            color: #555;
            margin-bottom: 30px;
        }

        input[type="file"] {
            padding: 12px;
            border-radius: 12px;
            border: 2px dashed #aaa;
            width: 100%;
            cursor: pointer;
            margin-bottom: 20px;
            background: #fff;
            transition: 0.3s;
        }

        input[type="file"]:hover {
            border-color: #2b5876;
            background: #f9fcff;
        }

        input[type="submit"] {
            background: linear-gradient(135deg, #ff7a18, #ffb347);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            transform: scale(1.08);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .result {
            margin-top: 25px;
            font-size: 18px;
            font-weight: 500;
            padding: 12px;
            border-radius: 10px;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Review Classifier App</h1>
        <div class="subtitle">
            Upload a file containing reviews and download sentiment results instantly 🚀
        </div>

        <form method="POST" enctype="multipart/form-data" id="uploadForm">
            <input type="file" name="file" id="fileInput" required/>
            <br/>
            <input type="submit" value="Upload & Classify"/>
        </form>

        <div id="messageBox"></div>
    </div>

    <script>
        const fileInput = document.getElementById("fileInput");
        const messageBox = document.getElementById("messageBox");
        const form = document.getElementById("uploadForm");

        // Clear old message when selecting new file
        fileInput.addEventListener("change", function() {
            messageBox.innerHTML = "";
        });

        // After form submit (simulate after download trigger)
        form.addEventListener("submit", function() {
            setTimeout(function() {
                // Show success message
                messageBox.innerHTML = `
                    <div class="result success">
                        File processed successfully ✅
                    </div>
                `;

                // Clear file input
                fileInput.value = "";
            }, 1000); // slight delay to allow request to go
        });
    </script>
</body>
</html>
